<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一方御湾商住小区物业管理缴费系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f0f2f5;color:#333;}

        /* 顶部状态栏 */
        .top-bar {
            background:#1f4e79;color:#fff;
            padding:9px 15px;
            display:flex;justify-content:space-between;
            align-items:center;font-size:15px;
        }

        /* 小区顶部通栏背景 永不空白 */
        .top-banner {
            width:100%;height:300px;
            background:linear-gradient(145deg,#163552,#1f4e79,#3182ce);
        }

        /* 功能按钮 */
        .func-wrap{
            max-width:1100px;margin:40px auto;
            display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:0 20px;
        }
        .func-btn{
            background:#1f4e79;color:white;border:none;padding:22px;border-radius:8px;font-size:17px;cursor:pointer;
        }
        .func-btn:hover{background:#163552;}

        /* 弹窗样式 */
        .mask{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;z-index:998;}
        .pop{
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            background:white;padding:30px;border-radius:10px;width:90%;max-width:520px;
            display:none;z-index:999;
        }
        .close{text-align:right;cursor:pointer;color:#666;}
        input{width:100%;margin:8px 0;padding:10px;border:1px solid #ddd;border-radius:4px;}
        .submit-btn{width:100%;padding:12px;background:#1f4e79;color:white;border:none;border-radius:4px;margin-top:10px;cursor:pointer;}
