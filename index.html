<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一方御湾商住小区物业管理缴费系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f0f2f5;color:#333;overflow-x:hidden;}

        /* 顶部状态栏 */
        .top-bar {
            background:#1f4e79;color:#fff;
            padding:12px 20px;
            display:flex;justify-content:space-between;
            align-items:center;font-size:16px;
        }

        /* 一方御湾小区图 直接嵌入代码 永久显示 永不失效 */
        .top-banner {
            width:100%;
            height:340px;
            background: url("https://p9-flow-image-sign.byteimg.com/tos-cn-i-a9rns3fr3dupr3bsr/ec810800151c4078995119999999999c~tplv-73owjymdk6-image.image") center/cover no-repeat;
        }

        /* 黑色滚动跑马灯 仅小区+物业电话 */
        .ad-banner {
            width:100%;
            height:120px;
            background:#111;
            overflow:hidden;
            position:relative;
            display:flex;
            align-items:center;
        }
        .scroll-text {
            position:absolute;
            white-space:nowrap;
            color:#fff;
            font-size:26px;
            font-weight:bold;
            animation: scrollRun 18s linear infinite;
        }
        @keyframes scrollRun {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 功能按钮区 */
        .func-wrap{
            max-width:1200px;margin:40px auto;
            display:grid;grid-template-columns:repeat(4,1fr);gap:25px;padding:0 20px;
        }
        .func-btn{
            background:#1f4e79;color:#fff;border:none;
            padding:28px 12px;font-size:18px;border-radius:8px;cursor:pointer;
            transition:0.2s;
        }
        .func-btn:hover{background:#163552;transform:translateY(-2px);}

        .admin-enter{text-align:center;margin:30px 0 50px;}

        footer{text-align:center;padding:30px;color:#666;font-size:15px;}
    </style>
</head>
<body>

<div class="top-bar">
    <strong>云浮·罗定 一方御湾小区</strong>
    <span>北京时间：<span id="time"></span></span>
</div>

<!-- 你的一方御湾小区全景图 永久显示 -->
<div class="top-banner"></div>

<!-- 滚动通知：小区+物业电话 -->
<div class="ad-banner">
    <div class="scroll-text">
        🏠 一方御湾小区｜物业服务中心服务热线：0766‑3913001 🏠
    </div>
</div>

<!-- 四大功能按钮 点击全部打开独立新页面 -->
<div class="func-wrap">
    <button class="func-btn" onclick="openPayPage()">💰 物业费缴费</button>
    <button class="func-btn" onclick="openVotePage()">🗳️ 业主投票</button>
    <button class="func-btn" onclick="openRegPage()">👤 业主登记</button>
    <button class="func-btn" onclick="openRepairPage()">🔧 报修申报</button>
</div>

<div class="admin-enter">
    <button class="func-btn" onclick="openAdminLogin()">🔐 管理员后台登录</button>
</div>

<footer>一方御湾商住小区 · 专属物业管理缴费系统</footer>

<script>
    // 实时时间
    function upTime(){
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString();
    }
    setInterval(upTime,1000);upTime();

    // 统一保存数据函数
    function saveData(type,obj){
        let all = JSON.parse(localStorage.getItem('物业全部数据')||'[]');
        all.push({...obj,type,time:new Date().toLocaleString()});
        localStorage.setItem('物业全部数据',JSON.stringify(all));
    }

    // 1. 物业费缴费 独立新页面
    function openPayPage(){
        let win = window.open('','_blank');
        win.document.write(`
        <style>body{padding:40px;font-family:"微软雅黑";max-width:600px;margin:0 auto;}
        input{width:100%;margin:10px 0;padding:12px;border:1px solid #ddd;border-radius:5px;font-size:16px;}
        .btn{width:100%;padding:14px;background:#1f4e79;color:#fff;border:none;border-radius:5px;font-size:18px;cursor:pointer;margin-top:20px;}
        .receipt{border:2px dashed #333;padding:30px;position:relative;margin-top:30px;}
        .seal{position:absolute;right:20px;bottom:30px;width:120px;height:120px;border:3px solid #c00;border-radius:50%;color:#c00;font-weight:bold;display:flex;align-items:center;justify-content:center;transform:rotate(-15deg);opacity:0.8;}
        </style>
        <h1 style="text-align:center;color:#1f4e79;margin-bottom:30px;">物业费缴费办理</h1>
        <input type="text" id="house" placeholder="房号（例：3栋1502）">
        <input type="text" id="name" placeholder="业主姓名">
        <input type="number" id="money" placeholder="缴费金额（元）">
        <input type="month" id="month">
        <button class="btn" onclick="submitPay()">确认提交，生成收据</button>

        <script>
            function submitPay(){
                const house = document.getElementById('house').value;
                const name = document.getElementById('name').value;
                const money = document.getElementById('money').value;
                const month = document.getElementById('month').value;
                const time = new Date().toLocaleString();
                if(!house||!name||!money||!month){alert('请填写完整信息');return;}

                // 保存数据
                window.opener.saveData('缴费',{house,name,money,month,time});

                // 显示收据
                document.body.innerHTML = \`
                <style>body{padding:40px;font-family:"微软雅黑";max-width:600px;margin:0 auto;}
                .receipt{border:2px dashed #333;padding:30px;position:relative;margin-top:30px;}
                .seal{position:absolute;right:20px;bottom:30px;width:120px;height:120px;border:3px solid #c00;border-radius:50%;color:#c00;font-weight:bold;display:flex;align-items:center;justify-content:center;transform:rotate(-15deg);opacity:0.8;}
                .btn{width:100%;padding:14px;background:#1f4e79;color:#fff;border:none;border-radius:5px;font-size:18px;cursor:pointer;margin-top:20px;}
                </style>
                <h1 style="text-align:center;color:#1f4e79;">物业官方缴费收据</h1>
                <div class="receipt">
                    <p style="font-size:18px;margin:12px 0;">房号：\${house}</p>
                    <p style="font-size:18px;margin:12px 0;">业主姓名：\${name}</p>
                    <p style="font-size:18px;margin:12px 0;">缴费月份：\${month}</p>
                    <p style="font-size:18px;margin:12px 0;">缴费金额：¥ \${money}</p>
                    <p style="font-size:18px;margin:12px 0;">缴费时间：\${time}</p>
                    <div class="seal">一方御湾小区<br>物业收款<br>专用公章</div>
                </div>
                <button class="btn" onclick="window.close()">确认留存，关闭页面</button>
                \`;
            }
        <\/script>
        `);
    }

    // 2. 业主投票 独立新页面
    function openVotePage(){
        let win = window.open('','_blank');
        win.document.write(`
        <style>body{padding:40px;font-family:"微软雅黑";max-width:600px;margin:0 auto;}
        input{width:100%;margin:10px 0;padding:12px;border:1px solid #ddd;border-radius:5px;font-size:16px;}
        .btn{width:100%;padding:14px;background:#1f4e79;color:#fff;border:none;border-radius:5px;font-size:18px;cursor:pointer;margin-top:20px;}
        </style>
        <h1 style="text-align:center;color:#1f4e79;margin-bottom:30px;">业主投票</h1>
        <input type="text" id="house" placeholder="房号">
        <input type="text" id="name" placeholder="业主姓名">
        <input type="text" id="option" placeholder="投票选项">
        <button class="btn" onclick="submitVote()">提交投票</button>

        <script>
            function submitVote(){
                const house = document.getElementById('house').value;
                const name = document.getElementById('name').value;
                const option = document.getElementById('option').value;
                if(!house||!name||!option){alert('请填写完整信息');return;}
                window.opener.saveData('投票',{house,name,option});
                alert('投票提交成功！');
                window.close();
            }
        <\/script>
        `);
    }

    // 3. 业主登记 独立新页面
    function openRegPage(){
        let win = window.open('','_blank');
        win.document.write(`
        <style>body{padding:40px;font-family:"微软雅黑";max-width:600px;margin:0 auto;}
        input{width:100%;margin:10px 0;padding:12px;border:1px solid #ddd;border-radius:5px;font-size:16px;}
        .btn{width:100%;padding:14px;background:#1f4e79;color:#fff;border:none;border-radius:5px;font-size:18px;cursor:pointer;margin-top:20px;}
        </style>
        <h1 style="text-align:center;color:#1f4e79;margin-bottom:30px;">业主信息登记</h1>
        <input type="text" id="house" placeholder="房号">
        <input type="text" id="name" placeholder="业主姓名">
        <input type="tel" id="phone" placeholder="联系电话">
        <button class="btn" onclick="submitReg()">提交登记信息</button>

        <script>
            function submitReg(){
                const house = document.getElementById('house').value;
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                if(!house||!name||!phone){alert('请填写完整信息');return;}
                window.opener.saveData('登记',{house,name,phone});
                alert('登记提交成功！');
                window.close();
            }
        <\/script>
        `);
    }

    // 4. 报修申报 独立新页面
    function openRepairPage(){
        let win = window.open('','_blank');
        win.document.write(`
        <style>body{padding:40px;font-family:"微软雅黑";max-width:600px;margin:0 auto;}
        input,textarea{width:100%;margin:10px 0;padding:12px;border:1px solid #ddd;border-radius:5px;font-size:16px;}
        textarea{height:100px;resize:none;}
        .btn{width:100%;padding:14px;background:#1f4e79;color:#fff;border:none;border-radius:5px;font-size:18px;cursor:pointer;margin-top:20px;}
        </style>
        <h1 style="text-align:center;color:#1f4e79;margin-bottom:30px;">报修工单申报</h1>
        <input type="text" id="house" placeholder="房号">
        <textarea id="desc" placeholder="故障详细描述"></textarea>
        <button class="btn" onclick="submitRepair()">提交报修工单</button>

        <script>
            function submitRepair(){
                const house = document.getElementById('house').value;
                const desc = document.getElementById('desc').value;
                if(!house||!desc){alert('请填写完整信息');return;}
                window.opener.saveData('报修',{house,desc});
                alert('报修工单提交成功！我们会尽快安排人员上门');
                window.close();
            }
        <\/script>
        `);
    }

    // 管理员登录 独立新页面
    function openAdminLogin(){
        let win = window.open('','_blank');
        win.document.write(`
        <style>body{padding:40px;font-family:"微软雅黑";max-width:500px;margin:0 auto;}
        input{width:100%;margin:10px 0;padding:12px;border:1px solid #ddd;border-radius:5px;font-size:16px;}
        .btn{width:100%;padding:14px;background:#1f4e79;color:#fff;border:none;border-radius:5px;font-size:18px;cursor:pointer;margin-top:20px;}
        </style>
        <h1 style="text-align:center;color:#1f4e79;margin-bottom:30px;">管理员专属登录</h1>
        <input type="text" id="user" placeholder="管理员账号">
        <input type="password" id="pwd" placeholder="管理员密码">
        <p style="text-align:center;color:#888;margin-top:10px;">账号：admin  密码：99886</p>
        <button class="btn" onclick="login()">登录后台</button>

        <script>
            function login(){
                const u = document.getElementById('user').value;
                const p = document.getElementById('pwd').value;
                if(u==='admin'&&p==='99886'){
                    // 打开真正的管理后台
                    let adminWin = window.open('','_blank');
                    window.close();

                    adminWin.document.write(\`
                    <style>
                        body{padding:30px;font-family:"微软雅黑";margin:0;}
                        table{border-collapse:collapse;width:100%;margin:15px 0;}
                        th,td{border:1px solid #333;padding:10px;text-align:center;}
                        .btn{padding:10px 20px;background:#008822;color:#fff;border:none;border-radius:5px;margin:8px;cursor:pointer;font-size:15px;}
                        .block{margin:40px 0;padding:20px;border:1px solid #ccc;border-radius:8px;}
                        h1{color:#1f4e79;}
                        h2{color:#1f4e79;font-size:20px;}
                    </style>
                    <h1>📊 一方御湾 · 独立管理后台</h1><hr>
                    \`);

                    // 生成4个独立表格
                    const types = [
                        {title:'物业费缴费',type:'缴费'},
                        {title:'业主投票记录',type:'投票'},
                        {title:'业主登记信息',type:'登记'},
                        {title:'报修工单列表',type:'报修'}
                    ];

                    types.forEach(t=>{
                        let data = JSON.parse(localStorage.getItem('物业全部数据')||'[]').filter(i=>i.type===t.type);
                        let html = \`<div class="block"><h2>\${t.title}</h2><button class="btn" onclick="genCSV('\${t.type}','\${t.title}')">一键导出\${t.title}Excel</button><table><tr style="background:#1f4e79;color:#fff;"><th>房号</th><th>业主</th><th>金额</th><th>月份</th><th>提交时间</th></tr>\`;
                        data.forEach(d=>{
                            html += \`<tr><td>\${d.house||'-'}</td><td>\${d.name||'-'}</td><td>\${d.money||'-'}</td><td>\${d.month||'-'}</td><td>\${d.time}</td></tr>\`;
                        });
                        html += '</table></div>';
                        adminWin.document.write(html);
                    });

                    // 导出函数
                    adminWin.document.write(\`
                    <script>
                        function genCSV(type,title){
                            let d = JSON.parse(localStorage.getItem('物业全部数据')||'[]').filter(i=>i.type===type);
                            let csv='\\ufeff房号,业主,金额,月份,时间,类型\\n';
                            d.forEach(i=>csv += (i.house||'')+','+(i.name||'')+','+(i.money||'')+','+(i.month||'')+','+i.time+','+i.type+'\\n');
                            const blob = new Blob([csv],{type:'text/csv'});
                            const a = document.createElement('a');
                            a.href=URL.createObjectURL(blob);
                            a.download=title+'数据报表.csv';a.click();
                        }
                    <\/script>
                    \`);

                }else{
                    alert('账号或密码错误');
                }
            }
        <\/script>
        `);
    }
</script>
</body>
</html>
